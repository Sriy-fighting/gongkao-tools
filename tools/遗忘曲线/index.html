<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遗忘曲线 · 复习计划</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <svg class="site-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <h1>遗忘曲线 <span class="header-sep">·</span> 复习计划</h1>
    </div>
    <span class="header-date" id="headerDate"></span>
  </div>
</header>

<main class="container">

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="review" onclick="switchTab('review')">复习</button>
    <button class="tab-btn" data-tab="plan" onclick="switchTab('plan')">计划</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">记录</button>
  </div>

  <!-- ==================== REVIEW TAB ==================== -->
  <div class="tab-content active" id="tab-review">

    <div class="section stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-value" id="statTotal">0</span>
        <span class="stat-label">学习项目</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="statToday">0</span>
        <span class="stat-label">今日复习</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="statRate">0%</span>
        <span class="stat-label">完成率</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="statStreak">0</span>
        <span class="stat-label">连续天数</span>
      </div>
    </div>

    <section class="section" id="reviewSection">
      <div class="section-title">
        <h2>今日复习</h2>
        <span class="section-badge" id="reviewBadge"></span>
        <button class="btn-export" id="exportBtn" title="导出数据">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="btn-export" id="importBtn" title="导入数据">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
      <div id="reviewList"></div>
      <div id="reviewEmpty" class="empty-state">
        <div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <p class="empty-text">今天没有待复习的内容</p>
        <p class="empty-hint">学点新东西，系统会自动安排复习计划</p>
      </div>
    </section>

    <section class="section" id="weeklySection">
      <div class="section-title"><h2>本周预览</h2></div>
      <div class="weekly-grid" id="weeklyGrid"></div>
    </section>

    <section class="section" id="addSection">
      <div class="section-title"><h2>记录今日学习</h2></div>
      <form id="addForm">
        <textarea id="contentInput" placeholder="今天学了什么？要背诵什么？
把你需要记住的内容写在这里……" rows="3" required></textarea>
        <div class="form-row">
          <input type="text" id="tagInput" class="tag-input" placeholder="分类标签（可选）">
          <button type="submit" class="btn-primary" id="submitBtn">保存</button>
        </div>
      </form>
    </section>

  </div>

  <!-- ==================== PLAN TAB ==================== -->
  <div class="tab-content" id="tab-plan">

    <!-- Month Navigation -->
    <div class="plan-month-nav">
      <button class="month-nav-btn" onclick="planMonthChange(-1)" title="上个月">←</button>
      <span class="month-nav-title" id="planMonthTitle">2026年6月</span>
      <button class="month-nav-btn" onclick="planMonthChange(1)" title="下个月">→</button>
      <button class="month-nav-today" onclick="planGoToday()">今天</button>
    </div>

    <!-- Monthly Progress -->
    <div class="plan-month-progress">
      <div class="plan-month-stats">
        <span>总任务: <strong id="planTotal">0</strong></span>
        <span>已完成: <strong id="planDone">0</strong></span>
        <span>完成率: <strong id="planRate">0%</strong></span>
      </div>
      <div class="plan-progress-bar">
        <div class="plan-progress-fill" id="planProgressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Weekly Goal Editor -->
    <div id="planWeeklyList"></div>

    <!-- Empty State -->
    <div id="planEmpty" class="empty-state" style="display:none;">
      <div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div>
      <p class="empty-text">还没有计划</p>
      <p class="empty-hint">点击下方按钮创建本月计划</p>
      <button class="btn-primary" onclick="initMonthPlan()" style="margin-top:12px;">+创建本月计划</button>
    </div>

    <div class="plan-footer-actions">
      <button class="btn-export" onclick="initMonthPlan()">+新增本月计划</button>
      <button class="btn-export" onclick="exportPlanData()">导出计划</button>
      <button class="btn-export" onclick="document.getElementById('planImportFile').click()">导入计划</button>
      <input type="file" id="planImportFile" accept=".json" style="display:none" onchange="importPlanData(event)">
    </div>

  </div>

  <!-- ==================== HISTORY TAB ==================== -->
  <div class="tab-content" id="tab-history">

    <section class="section" id="historySection">
      <div class="section-title">
        <h2>学习记录</h2>
        <span class="section-badge section-badge-muted" id="historyBadge"></span>
      </div>
      <div class="search-bar">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索学习记录...">
      </div>
      <div id="historyList"></div>
      <div id="historyEmpty" class="empty-state">
        <div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
        <p class="empty-text">还没有学习记录</p>
        <p class="empty-hint">在复习标签页记录你的第一个学习项目吧</p>
      </div>
    </section>

  </div>

</main>

<!-- Undo Toast -->
<div class="toast" id="undoToast">
  <span class="toast-msg" id="toastMsg"></span>
  <button class="toast-btn" id="undoBtn">撤销</button>
</div>

<script src="app.js"></script>
<script src="../公考工具箱/assets/js/sync.js"></script>
</body>
</html>
